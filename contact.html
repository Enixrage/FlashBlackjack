<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact - Blackjack BootCamp</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #006400;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding-top: 100px;
      box-sizing: border-box;
    }

    header {
      background-color: black;
      color: white;
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 10;
      box-sizing: border-box;
    }

    header h1 {
      margin: 0;
      font-size: 36px;
      font-weight: bold;
      display: flex;
      align-items: center;
      transition: all 0.3s ease;
    }

    header h1:hover {
      color: black;
      text-shadow: 1px 1px 0 white, -1px -1px 0 white, 1px -1px 0 white, -1px 1px 0 white;
    }

    header img {
      height: 40px;
      margin-right: 10px;
    }

    .logo {
      width: 80px;
      height: auto;
      filter: brightness(0) invert(1);
    }

    .login-button {
      background-color: black;
      color: white;
      border: 2px solid white;
      padding: 10px 20px;
      font-size: 16px;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      position: absolute;
      right: 20px;
      top: 20px;
    }

    .login-button:hover {
      background-color: white;
      color: black;
    }

    .contact-section {
  text-align: center;
  max-width: 600px;
  width: 100%;
  padding: 20px;
  margin: 0 auto; /* <-- Ensures horizontal centering */
  display: flex;
  flex-direction: column;
  align-items: center;
}


    .contact-section p {
      font-size: 18px;
      line-height: 1.6;
      margin-bottom: 30px;
    }

    .contact-form {
      background-color: rgba(0, 0, 0, 0.4);
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
      width: 100%;
      max-width: 500px;
      margin: 0 auto;
    }

    .contact-form h2 {
      margin-bottom: 20px;
    }

    .contact-form input,
    .contact-form textarea {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
    }

    .contact-form button {
      width: 100%;
      padding: 15px;
      font-size: 18px;
      font-weight: bold;
      border-radius: 8px;
      background-color: white;
      color: black;
      border: none;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    .contact-form button:hover {
      background-color: #ccc;
    }
  </style>
</head>
<body>

  <header>
    <a href="index.html" style="display: flex; align-items: center; text-decoration: none; color: inherit;">
      <img src="http://blackjackbootcamp.live/image.php" alt="Poker Cards Logo" class="logo">
      <h1>Blackjack BootCamp</h1>
    </a>
    <a href="login.html" class="login-button">Login</a>
  </header>

  <div class="contact-section">
    <p>
      Have a suggestion or some feedback for us? Whether it's a tweak to the game, new flashcard ideas, or feature requests—we want to hear from you!
      Fill out the form below and let us know how we can make Blackjack BootCamp even better.
    </p>

    <div class="contact-form">
      <h2>Contact Us</h2>
      <form action="mailto:ky833222@ucf.edu" method="POST" enctype="text/plain">
        <input type="text" name="name" placeholder="Your Name" required />
        <input type="email" name="email" placeholder="Your Email" required />
        <textarea name="message" rows="6" placeholder="Your Message" required></textarea>
        <button type="submit">Send Message</button>
      </form>
    </div>
  </div>

</body>
</html>
