<!DOCTYPE html>
<html lang="en">
<head>

  <link rel="apple-touch-icon" sizes="180x180" href="/images/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/images/favicon-16x16.png">
  <link rel="manifest" href="/images/site.webmanifest">
  
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact - Blackjack BootCamp</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #006400;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding-top: 120px;
    }

    .contact-section {
      text-align: center;
      max-width: 600px;
      width: 100%;
      padding: 20px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .contact-section p {
      font-size: 18px;
      line-height: 1.6;
      margin-bottom: 30px;
    }

    .contact-form {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: rgba(0, 0, 0, 0.4);
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
      width: 100%;
      max-width: 500px;
      margin: 0 auto;
    }

    .contact-form h2 {
      margin-bottom: 20px;
      text-align: center;
    }

    .contact-form input,
    .contact-form textarea,
    .contact-form button {
      width: 80%;
      max-width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      box-sizing: border-box;
    }

    .contact-form button {
      font-size: 18px;
      font-weight: bold;
      background-color: white;
      color: black;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    .contact-form button:hover {
      background-color: #ccc;
    }

    .success-message {
      margin-top: 10px;
      font-weight: bold;
      color: lightgreen;
    }

    .error-message {
      margin-top: 10px;
      font-weight: bold;
      color: red;
    }
  </style>
</head>
<body>

  <div id="header-container" style="width: 100%; padding: 0; margin: 0;"></div>

  <div class="contact-section">
    <p>
      Have a suggestion or some feedback for us? Whether it's a tweak to the game, new flashcard ideas, or feature requests—we want to hear from you!
      Fill out the form below and let us know how we can make Blackjack BootCamp even better.
    </p>

    <div class="contact-form">
      <h2>Contact Us</h2>
      <form id="contact-form" action="https://formspree.io/f/xzzeozoj" method="POST">
        <input type="text" name="name" placeholder="Your Name" required />
        <input type="email" name="email" placeholder="Your Email" required />
        <textarea name="message" rows="6" placeholder="Your Message" required></textarea>
        <button type="submit">Send Message</button>
      </form>
      <div id="form-response" class="success-message" style="display: none;">Thank you! Your message has been sent.</div>
    </div>
  </div>

  <div id="footer-container" style="width: 100%; padding: 0; margin: 0; margin-top:auto;"></div>

  <script>
    // Load header
    fetch('header.html')
      .then(response => response.text())
      .then(data => {
        document.getElementById('header-container').innerHTML = data;
      });

    // Load footer
    fetch('footer.html')
      .then(response => response.text())
      .then(data => {
        document.getElementById('footer-container').innerHTML = data;
      });

    // Show message after successful submit
    const form = document.getElementById('contact-form');
    const responseMsg = document.getElementById('form-response');

    form.addEventListener('submit', function(e) {
      e.preventDefault();
      const formData = new FormData(form);

      fetch(form.action, {
        method: 'POST',
        body: formData,
        headers: { 'Accept': 'application/json' }
      }).then(response => {
        if (response.ok) {
          responseMsg.style.display = 'block';
          form.reset();
        } else {
          responseMsg.textContent = 'Oops! Something went wrong.';
          responseMsg.style.color = 'red';
          responseMsg.style.display = 'block';
        }
      });
    });
  </script>

</body>
</html>
