<!-- login.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="apple-touch-icon" sizes="180x180" href="/images/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/images/favicon-16x16.png">
    <link rel="manifest" href="/images/site.webmanifest">
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Blackjack BootCamp</title>
    <meta name="google-signin-client_id" content="987437750263-p3sjh6j924f44spcbvui4bce7lpnvprt.apps.googleusercontent.com"> 
    <script src="https://apis.google.com/js/platform.js" async defer></script> 
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #006400;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 120px;
            min-height: 100vh;
        }

        .form-container {
            background-color: black;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
            width: 90%;
            max-width: 400px;
            text-align: left;
        }

        .form-container h2 {
            text-align: center;
            margin-bottom: 30px;
        }

        label {
            font-weight: bold;
            display: block;
            margin: 10px 0 5px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 16px;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            background-color: white;
            color: black;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .submit-btn:hover {
            background-color: #ccc;
        }

        .g-signin2 {
            margin-top: 30px;
            display: flex;
            justify-content: center;
        }
    </style>
</head>
<body>

    <div id="header-container"></div>

    <div class="form-container">
        <h2>Login</h2>
        <form>
            <label for="username">Username</label>
            <input type="text" name="username" required>

            <label for="password">Password</label>
            <input type="password" name="password" required>

            <div class="btn-group">
                <button type="button" class="submit-btn" onclick="location.href='index.html'">Login</button>
                <button type="button" class="submit-btn" onclick="location.href='signup.html'">Sign Up</button>
            </div>
        </form>

        <div class="g-signin2" data-onsuccess="onSignIn"></div>
    </div>

    <div id="footer-container" style="width: 100%; padding: 0; margin: 0; margin-top:auto;"></div>

    <script>
        fetch('header.html')
            .then(res => res.text())
            .then(data => document.getElementById('header-container').innerHTML = data);

        fetch('footer.html')
            .then(res => res.text())
            .then(data => document.getElementById('footer-container').innerHTML = data);
    <script>
        
    <script>
        function onSignIn(googleUser) {
            const id_token = googleUser.getAuthResponse().id_token;

            fetch('/auth/google', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id_token })
            })
            .then(res => res.json())
            .then(data => {
                if (data.redirect) {
                    window.location.href = data.redirect;
                } else {
                    alert('Login failed');
                }
            })
            .catch(err => {
                console.error('Google Login Error:', err);
            });
        }
    </script>
</body>
</html>
