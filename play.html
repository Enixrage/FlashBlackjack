<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blackjack Game</title>
  <link rel="apple-touch-icon" sizes="180x180" href="/images/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/images/favicon-16x16.png">
  <link rel="manifest" href="/images/site.webmanifest">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #006400;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding-top: 10px;
    }

    header {
      background-color: black;
      color: white;
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 10;
      box-sizing: border-box;
    }

    header h1 {
      margin: 0;
      font-size: 36px;
      font-weight: bold;
      display: flex;
      align-items: center;
    }

    header img {
      height: 40px;
      margin-right: 10px;
    }

    #bet-container {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 1;
    }

    #bet-container input {
      padding: 10px;
      font-size: 20px;
      margin-bottom: 10px;
      border: 2px solid white;
      border-radius: 8px;
      background-color: transparent;
      color: white;
      width: 200px;
    }

    #bet-container button {
      padding: 10px 20px;
      font-size: 18px;
      background-color: black;
      color: white;
      border: 2px solid white;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    #bet-container button:hover {
      background-color: white;
      color: black;
    }

    .button-container {
      display: flex;
      gap: 20px;
      justify-content: center;
      margin-top: 20px;
    }

    .button {
      background-color: black;
      color: white;
      font-size: 20px;
      font-weight: bold;
      padding: 15px 30px;
      border: 2px solid white;
      border-radius: 10px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    .button:hover {
      background-color: white;
      color: black;
    }

    .card {
      width: 100px;
      height: auto;
      margin: 0 5px;
      display: inline-block;
    }

    #game-container {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 40px;
    }

    .player-row, .dealer-row {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }

    .hand-title {
      min-width: 120px;
      text-align: right;
      font-size: 24px;
      font-weight: bold;
    }

    .hand {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
    }

    #footer-container {
      margin-top: auto;
      width: 100%;
      padding: 20px;
      background-color: black;
      color: white;
      text-align: center;
    }
  </style>
</head>
<body>
  <div id="header-container"></div>

  <div id="bet-container">
    <h2>Place Your Bet</h2>
    <input type="number" id="bet-input" placeholder="Enter Bet Amount" min="1" step="1">
    <button onclick="placeBet()">Place Bet</button>
    <div id="quick-bet-container">
      <button id="quick-bet-5">+5</button>
      <button id="quick-bet-10">+10</button>
      <button id="quick-bet-50">+50</button>
      <button id="quick-bet-100">+100</button>
    </div>
    <p id="balance">Balance: $1000</p>
  </div>

  <div id="game-container" style="display: none;">
    <div class="dealer-row">
      <div class="hand-title">Dealer's Hand</div>
      <div id="dealer-cards" class="hand"></div>
    </div>
    <p id="dealer-total"></p>

    <div class="player-row">
      <div class="hand-title">Your Hand</div>
      <div id="player-cards" class="hand"></div>
    </div>
    <p id="player-total"></p>

    <div class="button-container">
      <button onclick="hit()" class="button">Hit</button>
      <button onclick="stand()" class="button">Stand</button>
      <button onclick="doubleDown()" class="button">Double Down</button>
    </div>

    <p id="result"></p>
    <p id="balance"></p>
  </div>

  <div id="footer-container"></div>

  <script>
    fetch('header.html')
      .then(response => response.text())
      .then(data => {
        document.getElementById('header-container').innerHTML = data;
      });

    fetch('footer.html')
      .then(response => response.text())
      .then(data => {
        document.getElementById('footer-container').innerHTML = data;
      });
  </script>
  <script src="blackjack.js"></script>
</body>
</html>
