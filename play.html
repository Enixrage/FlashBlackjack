<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="apple-touch-icon" sizes="180x180" href="/images/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/images/favicon-16x16.png">
  <link rel="manifest" href="/images/site.webmanifest">
    
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blackjack Game</title>
  <style>
    /* General Body and Background */
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background-color: #006400; /* Poker Table Green */
        color: white;
        display: flex;
        flex-direction: column;
        justify-content: center; /* Vertically center the content */
        align-items: center; /* Horizontally center the content */
        min-height: 100vh;
        text-align: center;
        padding-top: 120px; /* Space for the fixed header */
    }

    /* Card Styling */
    .card {
        width: 100px; /* Adjust the width of the cards */
        height: auto; /* Maintain aspect ratio */
        margin: 0 5px; /* Add space between the cards */
        display: inline-block; /* Align cards next to each other */
        transition: transform 0.6s ease;
    }

    /* Card Section */
    .hand {
        display: flex;
        justify-content: center; /* Center align cards */
        align-items: center;
        gap: 10px; /* Decrease space between cards */
        flex-wrap: nowrap; /* Prevent wrapping of cards */
        margin-top: 20px; /* Push cards down */
    }

    .hand-section {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-top: 10px;
    }

    .hand-section h2 {
        margin-bottom: 10px;
    }

    /* Cards adjustment to the right */
    .hand {
        margin-left: 40px; /* Move the cards slightly to the right */
    }

    /* Totals alignment */
    .total {
        margin-top: 10px;
        font-size: 20px;
    }

    /* Button Section */
    .button-container {
        display: flex;
        gap: 20px; /* Space between buttons */
        justify-content: center; /* Center buttons horizontally */
        margin-top: 20px;
    }

    .button {
        background-color: black;
        color: white;
        font-size: 20px;
        font-weight: bold;
        padding: 15px 30px;
        border: 2px solid white;
        border-radius: 10px;
        cursor: pointer;
        transition: background-color 0.3s ease;
    }

    .button:hover {
        background-color: white;
        color: black;
    }

    /* Bet Input Styling */
    #bet-container {
        position: absolute;
        top: 50%; /* Vertically center */
        left: 50%; /* Horizontally center */
        transform: translate(-50%, -50%); /* Perfectly center */
        display: flex;
        flex-direction: column;
        align-items: center;
        z-index: 1;
    }

    #bet-container input {
        padding: 10px;
        font-size: 20px;
        margin-bottom: 10px;
        border: 2px solid white;
        border-radius: 8px;
        background-color: transparent;
        color: white;
        width: 200px;
    }

    #bet-container button {
        padding: 10px 20px;
        font-size: 18px;
        background-color: black;
        color: white;
        border: 2px solid white;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    #bet-container button:hover {
        background-color: white;
        color: black;
    }

  
/* Result Popup as a floating panel */
#result-popup {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%); /* Perfect center */
    background-color: white;
    color: black;
    padding: 30px;
    border-radius: 12px;
    z-index: 1000;
    box-shadow: 0 0 15px rgba(0,0,0,0.5);
    display: none;
    text-align: center;
    max-width: 90vw;
    width: 400px;
}

#result-popup h2 {
    margin-bottom: 10px;
}

#result-popup p {
    margin: 10px 0;
}

#result-popup .button-container {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin-top: 15px;
}

#result-popup button {
    background-color: black;
    color: white;
    font-size: 16px;
    padding: 10px 20px;
    border: 2px solid black;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s ease;
}

#result-popup button:hover {
    background-color: white;
    color: black;
  border: 2px solid black;
}



    /* Footer */
    #footer-container {
        margin-top: auto; /* Ensures footer stays at the bottom */
        width: 100%;
        padding: 20px;
        background-color: black;
        color: white;
        text-align: center;
    }


  </style>
</head>
<body>
  <!-- Header with Title and Logo -->
  <div id="header-container" style="width: 100%; padding: 0; margin: 0;"></div>
  
  <!-- Bet Placement Page -->
  <div id="bet-container">
      <h2>Place Your Bet</h2>
      <input type="number" id="bet-input" placeholder="Enter Bet Amount" min="1" step="1">
      <button onclick="placeBet()">Place Bet</button>
      
      <div id="quick-bet-container">
          <button id="quick-bet-5">+5</button>
          <button id="quick-bet-10">+10</button>
          <button id="quick-bet-50">+50</button>
          <button id="quick-bet-100">+100</button>
      </div>
      
      <p id="balance">Balance: $1000</p>
  </div>

  <!-- Game Content (Hidden initially) -->
  <div id="game-container" style="display: none;">
      <!-- Dealer's Hand -->
      <div class="hand-section">
          <h2>Dealer's Hand</h2>
          <div class="hand">
              <div id="dealer-cards" class="cards-wrapper"></div>
              <p id="dealer-total" class="total"></p>
          </div>
      </div>

      <!-- Player's Hand -->
      <div class="hand-section">
          <h2>Your Hand</h2>
          <div class="hand">
              <div id="player-cards" class="cards-wrapper"></div>
              <p id="player-total" class="total"></p>
          </div>
      </div>

      <!-- Game Controls -->
      <div class="button-container">
          <button onclick="hit()" class="button">Hit</button>
          <button onclick="stand()" class="button">Stand</button>
          <button onclick="doubleDown()" class="button">Double Down</button>
      </div>

      <!-- Result and Balance -->
      <p id="result"></p>
      <p id="balance"></p>
  </div>
  <!-- Result Pop-up Container -->
<div id="result-popup" style="display: none;">
  <div class="result-popup-content">
    <h2 id="result-text"></h2>
    <p id="result-message"></p>
    <div class="button-container">
      <button onclick="playAgain()" class="button">Play Again</button>
      <button onclick="quitToHome()" class="button">Quit to Home</button>
    </div>
  </div>
</div>


  <div id="footer-container"></div>

  <script>
    // Load header
    fetch('header.html')
      .then(response => response.text())
      .then(data => {
        document.getElementById('header-container').innerHTML = data;
      })
      .catch(error => console.error('Error loading header:', error));

    // Load footer
    fetch('footer.html')
      .then(response => response.text())
      .then(data => {
        document.getElementById('footer-container').innerHTML = data;
      })
      .catch(error => console.error('Error loading footer:', error));
  </script>

  <script src="blackjack.js"></script>
</body>
</html>
