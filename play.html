<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blackjack Game</title>
  <link rel="apple-touch-icon" sizes="180x180" href="/images/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/images/favicon-16x16.png">
  <link rel="manifest" href="/images/site.webmanifest">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #006400;
      color: white;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      text-align: center;
    }

    /* Fixed Header */
    header {
      background-color: black;
      color: white;
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 10;
      box-sizing: border-box;
    }

    #header-container {
      width: 100%;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding-top: 100px;
      padding-bottom: 40px;
      width: 100%;
    }

    /* Bet Input Styling */
    #bet-container {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #bet-container input {
      padding: 10px;
      font-size: 20px;
      margin-bottom: 10px;
      border: 2px solid white;
      border-radius: 8px;
      background-color: transparent;
      color: white;
      width: 200px;
    }

    #bet-container button {
      padding: 10px 20px;
      font-size: 18px;
      background-color: black;
      color: white;
      border: 2px solid white;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    #bet-container button:hover {
      background-color: white;
      color: black;
    }

    #quick-bet-container {
      margin-top: 10px;
    }

    #quick-bet-container button {
      margin: 5px;
    }

    /* Card Styling */
    .card {
      width: 100px;
      margin: 0 5px;
    }

    .hand {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      margin-top: 40px;
      gap: 20px;
    }

    .cards-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .total {
      margin-left: 20px;
      min-width: 80px;
      text-align: left;
    }

    .button-container {
      display: flex;
      gap: 20px;
      justify-content: center;
      margin-top: 20px;
    }

    .button {
      background-color: black;
      color: white;
      font-size: 20px;
      font-weight: bold;
      padding: 15px 30px;
      border: 2px solid white;
      border-radius: 10px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    .button:hover {
      background-color: white;
      color: black;
    }

    #result {
      margin-top: 20px;
    }

    #play-again {
      margin-top: 20px;
    }

    #footer-container {
      background-color: black;
      color: white;
      text-align: center;
      padding: 20px;
    }
  </style>
</head>
<body>

  <div id="header-container"></div>

  <main>
    <!-- Bet Placement Page -->
    <div id="bet-container">
      <h2>Place Your Bet</h2>
      <input type="number" id="bet-input" placeholder="Enter Bet Amount" min="1" step="1" />
      <button onclick="placeBet()">Place Bet</button>

      <div id="quick-bet-container">
        <button id="quick-bet-5">+5</button>
        <button id="quick-bet-10">+10</button>
        <button id="quick-bet-50">+50</button>
        <button id="quick-bet-100">+100</button>
      </div>

      <p id="balance">Balance: $1000</p>
    </div>

    <!-- Game Content (Hidden initially) -->
    <div id="game-container" style="display: none;">
      <!-- Dealer's Hand -->
      <div>
        <h2>Dealer's Hand</h2>
        <div class="hand">
          <div id="dealer-cards" class="cards-wrapper"></div>
          <p id="dealer-total" class="total"></p>
        </div>
      </div>

      <!-- Player's Hand -->
      <div>
        <h2>Your Hand</h2>
        <div class="hand">
          <div id="player-cards" class="cards-wrapper"></div>
          <p id="player-total" class="total"></p>
        </div>
      </div>

      <!-- Game Controls -->
      <div class="button-container">
        <button onclick="hit()" class="button">Hit</button>
        <button onclick="stand()" class="button">Stand</button>
        <button onclick="doubleDown()" class="button">Double Down</button>
      </div>

      <!-- Result -->
      <p id="result"></p>
      <button id="play-again" class="button" onclick="resetGame()">Play Again</button>
    </div>
  </main>

  <div id="footer-container"></div>

  <script>
    // Load header
    fetch('header.html')
      .then(response => response.text())
      .then(data => {
        document.getElementById('header-container').innerHTML = data;
      });

    // Load footer
    fetch('footer.html')
      .then(response => response.text())
      .then(data => {
        document.getElementById('footer-container').innerHTML = data;
      });
  </script>

  <script src="blackjack.js"></script>
</body>
</html>
