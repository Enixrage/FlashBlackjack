<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blackjack Game</title>
    <style>
        /* General Body and Background */
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #006400; /* Poker Table Green */
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            padding-top: 80px; /* Space for the fixed header */
        }

        /* Header Styling */
        header {
            background-color: black;
            color: white;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center; /* Center everything */
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 10;
            box-sizing: border-box;
        }

        header h1 {
            margin: 0;
            font-size: 36px;
            font-weight: bold;
            display: flex;
            align-items: center;
            cursor: pointer; /* Make the title clickable */
            transition: all 0.3s ease;
        }

        header img {
            height: 40px;
            margin-right: 10px;
        }

        /* Hover effect for the header title */
header h1 {
    transition: all 0.3s ease;
}

header h1:hover {
    color: black; /* Change text color to black on hover */
    text-shadow: 0 0 5px white, 0 0 10px white, 0 0 15px white; /* Create white outline effect */
}

        .login-button {
            background-color: black;
            color: white;
            border: 2px solid white;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            position: absolute;
            right: 20px;
            top: 20px;
        }

        .login-button:hover {
            background-color: white;
            color: black;
        }

        /* Button Section */
        .button-container {
            display: flex;
            gap: 20px; /* Space between buttons */
            justify-content: center; /* Center buttons horizontally */
            margin-top: 20px;
        }

        .button {
            background-color: black;
            color: white;
            font-size: 20px;
            font-weight: bold;
            padding: 15px 30px;
            border: 2px solid white;
            border-radius: 10px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .button:hover {
            background-color: white;
            color: black;
        }

        .logo {
            width: 80px;
            height: auto;
            filter: brightness(0) invert(1);
        }

        /* Card Styling */
        .card {
            width: 100px; /* Adjust the width of the cards */
            height: auto; /* Maintain aspect ratio */
            margin: 0 5px; /* Add space between the cards */
            display: inline-block; /* Align cards next to each other */
        }

        /* Card Section */
        .hand {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        /* Play Again Button */
        #play-again {
            margin-top: 20px;
            background-color: black;
            color: white;
            font-size: 20px;
            padding: 15px 30px;
            border: 2px solid white;
            border-radius: 10px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        #play-again:hover {
            background-color: white;
            color: black;
        }

        /* Bet Input Styling */
        #bet-container {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #bet-container input {
            padding: 10px;
            font-size: 20px;
            margin-bottom: 10px;
            border: 2px solid white;
            border-radius: 8px;
            background-color: transparent;
            color: white;
            width: 200px;
        }

        #bet-container button {
            padding: 10px 20px;
            font-size: 18px;
            background-color: black;
            color: white;
            border: 2px solid white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        #bet-container button:hover {
            background-color: white;
            color: black;
        }

    </style>
</head>
<body>

    <!-- Header with Title and Logo -->
    <header onclick="window.location.href='index.html'">
        <img src="http://18.206.83.67/image.php" alt="Poker Cards Logo" class="logo">
        <h1>Blackjack Game</h1>
    </header>

    <div id="game">
        <!-- Bet Input -->
        <div id="bet-container">
            <h2>Place Your Bet</h2>
            <input type="number" id="bet-input" placeholder="Enter Bet Amount" min="1" step="1">
            <button onclick="placeBet()">Place Bet</button>
        </div>

        <!-- Dealer's Hand -->
        <div id="dealer" class="hand">
            <h2>Dealer's Hand</h2>
            <div id="dealer-cards"></div>
            <p id="dealer-total"></p>
        </div>

        <!-- Player's Hand -->
        <div id="player" class="hand">
            <h2>Your Hand</h2>
            <div id="player-cards"></div>
            <p id="player-total"></p>
        </div>

        <!-- Game Controls -->
        <div class="button-container">
            <button onclick="hit()" class="button">Hit</button>
            <button onclick="stand()" class="button">Stand</button>
            <button onclick="doubleDown()" class="button">Double Down</button>
        </div>

        <!-- Result and Balance -->
        <p id="result"></p>
        <p id="balance">Balance: $1000</p>

        <!-- Play Again Button -->
        <button id="play-again" onclick="resetGame()">Play Again</button>
    </div>

    <script src="blackjack.js"></script>

</body>
</html>
