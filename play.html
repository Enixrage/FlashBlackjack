<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Blackjack Game</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #006400;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding-top: 10px;
    }

    #bet-container {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #bet-container input {
      padding: 10px;
      font-size: 20px;
      margin-bottom: 10px;
      border: 2px solid white;
      border-radius: 8px;
      background-color: transparent;
      color: white;
      width: 200px;
    }

    #bet-container button {
      padding: 10px 20px;
      font-size: 18px;
      background-color: black;
      color: white;
      border: 2px solid white;
      border-radius: 8px;
      cursor: pointer;
    }

    #bet-container button:hover {
      background-color: white;
      color: black;
    }

    #quick-bet-container button {
      margin: 5px;
      padding: 5px 10px;
      font-size: 16px;
      background-color: black;
      color: white;
      border: 2px solid white;
      border-radius: 6px;
      cursor: pointer;
    }

    #quick-bet-container button:hover {
      background-color: white;
      color: black;
    }

    #game-container {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 40px;
    }

    .hand-row {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .hand-title {
      width: 130px;
      text-align: right;
      font-size: 24px;
      font-weight: bold;
    }

    .hand-cards {
      display: grid;
      grid-auto-flow: column;
      gap: 10px;
    }

    .hand-total {
      font-size: 20px;
      margin-left: 20px;
    }

    .card {
      width: 100px;
      height: auto;
    }

    .button-container {
      display: flex;
      gap: 20px;
      justify-content: center;
      margin-top: 20px;
    }

    .button {
      background-color: black;
      color: white;
      font-size: 20px;
      font-weight: bold;
      padding: 15px 30px;
      border: 2px solid white;
      border-radius: 10px;
      cursor: pointer;
    }

    .button:hover {
      background-color: white;
      color: black;
    }

    #result, #balance {
      font-size: 20px;
      margin-top: 10px;
    }

    #balance {
      text-align: center;
      width: 100%;
    }

    #footer-container {
      margin-auto:top;
      width: 100%;
      padding: 20px;
      background-color: black;
      color: white;
      text-align: center;
    }
  </style>
</head>
<body>

  <!-- Header placeholder -->
  <div id="header-container"></div>

  <!-- Bet Placement -->
  <div id="bet-container">
    <h2>Place Your Bet</h2>
    <input type="number" id="bet-input" placeholder="Enter Bet Amount" min="1" step="1">
    <button onclick="placeBet()">Place Bet</button>
    <div id="quick-bet-container">
      <button id="quick-bet-5">+5</button>
      <button id="quick-bet-10">+10</button>
      <button id="quick-bet-50">+50</button>
      <button id="quick-bet-100">+100</button>
    </div>
    <p id="balance">Balance: $1000</p>
  </div>

  <!-- Game Area -->
  <div id="game-container" style="display: none;">
    <div class="hand-row">
      <div class="hand-title">Dealer's Hand</div>
      <div id="dealer-cards" class="hand-cards"></div>
      <p id="dealer-total" class="hand-total">Total: 18</p>
    </div>

    <div class="hand-row">
      <div class="hand-title">Your Hand</div>
      <div id="player-cards" class="hand-cards"></div>
      <p id="player-total" class="hand-total">Total: 20</p>
    </div>

    <div class="button-container">
      <button onclick="hit()" class="button">Hit</button>
      <button onclick="stand()" class="button">Stand</button>
      <button onclick="doubleDown()" class="button">Double Down</button>
    </div>

    <p id="result"></p>
    <p id="balance">Balance: $1000</p>
  </div>

  <!-- Footer placeholder -->
  <div id="footer-container"></div>

  <script>
    fetch('header.html')
      .then(res => res.text())
      .then(data => document.getElementById('header-container').innerHTML = data);

    fetch('footer.html')
      .then(res => res.text())
      .then(data => document.getElementById('footer-container').innerHTML = data);
  </script>
  <script src="blackjack.js"></script>
</body>
</html>
