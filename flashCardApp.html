<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Blackjack Flashcards</title>
  <style>
    html, body {
  height: 100%;
  margin: 0;
  font-family: Arial, sans-serif;
}

body {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 20px;
  background-color: #f4f4f4;
}

.card {
  border: 2px solid #333;
  padding: 20px;
  margin-top: 20px;
  cursor: pointer;
  background-color: #000000;
  border-radius: 10px;
  color: #fff;
  text-align: center;
  width: 100%;
  max-width: 500px;
}

.hint { color: limegreen; margin-top: 10px; }
.strategy { color: skyblue; font-weight: bold; }
.controls, .scoring {
  margin-top: 20px;
}
.controls button, .scoring button {
  margin: 5px;
}
  </style>
</head>
<body>
  <h2>Blackjack Strategy Flashcards</h2>

  <div>
    <label>Select Difficulty: </label>
    <select id="difficulty">
      <option value="easy">Easy (Show Hint)</option>
      <option value="hard">Hard (No Hint)</option>
    </select>
  </div>

  <div id="card" class="card">
    <!-- Card content goes here -->
  </div>

  <div class="controls">
    <button id="prevBtn">⬅ Prev</button>
    <button id="nextBtn">Next ➡</button>
  </div>

  <div class="scoring">
    <p>Correct: <span id="correctCount">0</span></p>
    <p>Incorrect: <span id="incorrectCount">0</span></p>
    <button id="correctBtn">I Got It Right</button>
    <button id="incorrectBtn">I Got It Wrong</button>
  </div>

  <script src="flashcards.js"></script>
</body>
</html>
