<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Blackjack Flashcards</title>
  <link rel="apple-touch-icon" sizes="180x180" href="/images/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/images/favicon-16x16.png">
  <link rel="manifest" href="/images/site.webmanifest">

  <style>
    html, body {
      height: 100%;
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #004d00;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0;
      box-sizing: border-box;
    }

    main {
      width: 100%;
      max-width: 800px;
      padding: 140px 20px 80px; /* adjusted padding: 140px top = header height + spacing */
      box-sizing: border-box;
    }

    h2 {
      color: white;
      margin-bottom: 20px;
    }

    select {
      padding: 8px;
      font-size: 16px;
      border-radius: 5px;
      border: none;
      margin-top: 10px;
    }

    .card {
      background: #111;
      color: white;
      padding: 30px;
      border-radius: 16px;
      margin-top: 30px;
      box-shadow: 0 8px 16px rgba(0,0,0,0.3);
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    .card:hover {
      transform: scale(1.02);
    }

    .hint {
      color: limegreen;
      margin-top: 10px;
    }

    .strategy {
      color: skyblue;
      font-weight: bold;
    }

    .controls, .scoring {
      margin-top: 30px;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
    }

    .button {
      background-color: black;
      color: white;
      font-size: 20px;
      font-weight: bold;
      padding: 15px 30px;
      border: 2px solid white;
      border-radius: 10px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    .button:hover {
      background-color: white;
      color: black;
    }

    #play-again {
      margin-top: 30px;
    }

    #header-container,
    #footer-container {
      width: 100%;
      position: fixed;
      left: 0;
      background-color: #003300;
      color: white;
      padding: 20px;
      z-index: 1000;
    }

    #header-container {
      top: 0;
    }

    #footer-container {
      bottom: 0;
      text-align: center;
    }
  </style>
</head>
<body>
  <!-- Header -->
  <div id="header-container"></div>

  <main>
    <h2>Blackjack Strategy Flashcards</h2>

    <div>
      <label>Select Difficulty: </label>
      <select id="difficulty">
        <option value="easy">Easy (Show Hint)</option>
        <option value="hard">Hard (No Hint)</option>
      </select>
    </div>

    <div id="card" class="card">
      <!-- Card content goes here -->
    </div>

    <div class="controls">
      <button id="prevBtn" class="button">⬅ Prev</button>
      <button id="nextBtn" class="button">Next ➡</button>
    </div>

    <div class="scoring">
      <p>Correct: <span id="correctCount">0</span></p>
      <p>Incorrect: <span id="incorrectCount">0</span></p>
      <button id="correctBtn" class="button">I Got It Right</button>
      <button id="incorrectBtn" class="button">I Got It Wrong</button>
    </div>

    <button id="play-again" class="button">🔁 Play Again</button>
  </main>

  <!-- Footer -->
  <div id="footer-container"></div>

  <script src="flashcards.js"></script>
  <script>
    fetch('header.html')
      .then(res => res.text())
      .then(data => document.getElementById('header-container').innerHTML = data);

    fetch('footer.html')
      .then(res => res.text())
      .then(data => document.getElementById('footer-container').innerHTML = data);
  </script>
</body>
</html>
