<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Blackjack Flashcards</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; max-width: 600px; margin: auto; }
    .card {
      border: 2px solid #333;
      padding: 20px;
      margin-top: 20px;
      cursor: pointer;
      background-color: #000000;
      border-radius: 10px;
    }
    .hint { color: green; margin-top: 10px; }
    .strategy { color: navy; font-weight: bold; }
    .controls, .scoring {
      margin-top: 20px;
    }
    .controls button, .scoring button {
      margin-right: 10px;
    }
  </style>
  <link rel="stylesheet" href="Home.css">
</head>
<body>
  <h2>Blackjack Strategy Flashcards</h2>

  <div>
    <label>Select Difficulty: </label>
    <select id="difficulty">
      <option value="easy">Easy (Show Hint)</option>
      <option value="hard">Hard (No Hint)</option>
    </select>
  </div>

  <div id="card" class="card">
    <!-- Card content goes here -->
  </div>

  <div class="controls">
    <button id="prevBtn">⬅ Prev</button>
    <button id="nextBtn">Next ➡</button>
  </div>

  <div class="scoring">
    <p>Correct: <span id="correctCount">0</span></p>
    <p>Incorrect: <span id="incorrectCount">0</span></p>
    <button id="correctBtn">I Got It Right</button>
    <button id="incorrectBtn">I Got It Wrong</button>
  </div>

  <script src="flashcards.js"></script>
</body>
</html>
