<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blackjack Game</title>
    <style>
        /* General Body and Background */
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #006400; /* Poker Table Green */
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            padding-top: 80px; /* Space for the fixed header */
        }
        
        header {
            background-color: black;
            color: white;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center; /* Center the content */
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 10;
            box-sizing: border-box;
            position: relative;
        }
        
        .header-center {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        header h1 {
            margin: 0;
            font-size: 36px;
            font-weight: bold;
        }
        
        .logo {
            width: 80px;
            height: auto;
            filter: brightness(0) invert(1);
        }
        
        /* Login button positioned absolutely to the right */
        .login-button {
            position: absolute;
            right: 20px;
            background-color: black;
            color: white;
            border: 2px solid white;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            top: 50%;
            transform: translateY(-50%);
        }

        .login-button:hover {
            background-color: white;
            color: black;
        }

        /* Button Section */
        .button-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .button {
            background-color: black;
            color: white;
            font-size: 30px;
            font-weight: bold;
            padding: 30px 60px;
            margin: 10px;
            border: 2px solid black;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            border-radius: 10px;
            width: 300px;
        }

        .button:hover {
            background-color: white;
            color: black;
            border-color: black;
        }


    </style>
</head>
<body>

    <!-- Header with Title and Logo -->
    <header>
        <div class="header-center">
            <img src="http://18.206.83.67/image.php" alt="Poker Cards Logo" class="logo">
            <h1>Blackjack Game</h1>
        </div>
        <a href="login.html" class="login-button">Login</a>
    </header>
    
    <!-- Button Section -->
    <div class="button-container">
        <a href="play.js">
            <button class="button">Play Blackjack</button>
        </a>
        <a href="flashcards.js">
            <button class="button">How to Play</button>
        </a>
        <a href="settings.html">
            <button class="button">Settings</button>
        </a>
    </div>

</body>
</html>
