<!-- This is the same as the last version with an added footer -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Blackjack BootCamp</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #006400;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding-top: 100px;
      box-sizing: border-box;
    }

    header {
      background-color: black;
      color: white;
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 10;
      box-sizing: border-box;
    }

    header h1 {
      margin: 0;
      font-size: 36px;
      font-weight: bold;
      display: flex;
      align-items: center;
      transition: all 0.3s ease;
    }

    header h1:hover {
      color: black;
      text-shadow: 1px 1px 0 white, -1px -1px 0 white, 1px -1px 0 white, -1px 1px 0 white;
    }

    header img {
      height: 40px;
      margin-right: 10px;
    }

    .logo {
      width: 80px;
      height: auto;
      filter: brightness(0) invert(1);
    }

    .login-button {
      background-color: black;
      color: white;
      border: 2px solid white;
      padding: 10px 20px;
      font-size: 16px;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      position: absolute;
      right: 20px;
      top: 20px;
    }

    .login-button:hover {
      background-color: white;
      color: black;
    }

    .intro {
      max-width: 800px;
      background-color: rgba(0, 0, 0, 0.4);
      padding: 30px 20px;
      margin: 20px;
      border-radius: 15px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
      text-align: center;
      font-size: 18px;
      line-height: 1.6;
    }

    .button-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      margin-top: 20px;
      margin-bottom: 40px;
    }

    .button {
      background-color: black;
      color: white;
      font-size: 28px;
      font-weight: bold;
      padding: 25px 50px;
      border: 2px solid black;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s ease;
      width: 280px;
      text-transform: uppercase;
    }

    .button:hover {
      background-color: white;
      color: black;
      border-color: black;
    }

    
  </style>
</head>
<body>

  <header>
    <a href="index.html" style="display: flex; align-items: center; text-decoration: none; color: inherit;">
      <img src="http://blackjackbootcamp.live/image.php" alt="Poker Cards Logo" class="logo">
      <h1>Blackjack BootCamp</h1>
    </a>
    <a href="login.html" class="login-button">Login</a>
  </header>

  <div class="intro">
    <p>
      <strong>Blackjack BootCamp</strong> is your ultimate training ground to master the game of Blackjack.
      This interactive site uses flashcards, tutorials, and real-time simulations to help you learn the rules,
      sharpen your strategy, and gain the confidence to beat the dealer.
    </p>
  </div>

  <div class="button-container">
    <a href="play.html"><button class="button">Play Blackjack</button></a>
    <a href="Howtoplay.html"><button class="button">How to Play</button></a>
    <a href="flashCardApp.html"><button class="button">Flash Cards</button></a>
  </div>

  <script>
    // JavaScript to load the footer
    fetch('footer.html')
      .then(response => response.text())
      .then(data => {
        document.getElementById('footer-container').innerHTML = data;
      })
      .catch(error => {
        console.error('Error loading footer:', error);
      });
  </script>


</body>
</html>
