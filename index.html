<!DOCTYPE html>
<html lang="en">
<head>
  
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="manifest" href="/site.webmanifest">
  
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Blackjack BootCamp</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #006400;
      color: white;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      box-sizing: border-box;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 140px; /* More spacing under fixed header */
      box-sizing: border-box;
    }

    .intro {
      max-width: 800px;
      background-color: rgba(0, 0, 0, 0.4);
      padding: 30px 20px;
      margin: 20px;
      border-radius: 15px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
      text-align: center;
      font-size: 18px;
      line-height: 1.6;
    }

    .button-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      margin-top: 20px;
      margin-bottom: 40px;
    }

    .button {
      background-color: black;
      color: white;
      font-size: 28px;
      font-weight: bold;
      padding: 25px 50px;
      border: 2px solid black;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s ease;
      width: 280px;
      text-transform: uppercase;
    }

    .button:hover {
      background-color: white;
      color: black;
      border-color: black;
    }
  </style>
</head>
<body>
  <!-- Header -->
    <div id="header-container" style="width: 100%; padding: 0; margin: 0;"></div>

  <main>
    <div class="intro">
      <p>
        <strong>Blackjack BootCamp</strong> is your ultimate training ground to master the game of Blackjack.
        This interactive site uses flashcards, tutorials, and real-time simulations to help you learn the rules,
        sharpen your strategy, and gain the confidence to beat the dealer.
      </p>
    </div>

    <div class="button-container">
      <a href="Howtoplay.html"><button class="button">How to Play</button></a>
      <a href="flashCardApp.html"><button class="button">Flash Cards</button></a>
      <a href="play.html"><button class="button">Play Blackjack</button></a>
    </div>
  </main>

  <div id="footer-container" style="width: 100%; padding: 0; margin: 0;"></div>

  <script>
    // Load header
    fetch('header.html')
      .then(response => response.text())
      .then(data => {
        document.getElementById('header-container').innerHTML = data;
      })
      .catch(error => console.error('Error loading header:', error));

    // Load footer
    fetch('footer.html')
      .then(response => response.text())
      .then(data => {
        document.getElementById('footer-container').innerHTML = data;
      })
      .catch(error => console.error('Error loading footer:', error));
  </script>
</body>
</html>
