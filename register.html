<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registration Complete</title>
  <link rel="stylesheet" href="style.css"> <!-- optional if you have shared styles -->
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #006400;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding-top: 140px;
    }

    .message-box {
      background-color: black;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 0 12px rgba(255, 255, 255, 0.2);
      max-width: 500px;
      width: 90%;
    }

    .message-box h1 {
      margin-bottom: 20px;
    }

    .message-box p {
      font-size: 18px;
      margin-bottom: 30px;
    }

    .btn {
      background-color: white;
      color: black;
      padding: 15px 30px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
    }

    .btn:hover {
      background-color: #ccc;
    }
  </style>
</head>
<body>

  <div id="header-container"></div>

  <div class="message-box">
    <h1>✅ Registration Successful!</h1>
    <p>Your account has been created. You can now log in and start using Blackjack BootCamp.</p>
    <a href="login.html" class="btn">Back to Login</a>
  </div>
<div id="footer-container" style="width: 100%; padding: 0; margin: 0; margin-top:auto;"></div>

  <script>
    // Load header
    fetch('header.html')
      .then(response => response.text())
      .then(data => {
        document.getElementById('header-container').innerHTML = data;
      })
      .catch(error => console.error('Error loading header:', error));

    // Load footer
    fetch('footer.html')
      .then(response => response.text())
      .then(data => {
        document.getElementById('footer-container').innerHTML = data;
      })
      .catch(error => console.error('Error loading footer:', error));
  </script>
</body>
</html>
